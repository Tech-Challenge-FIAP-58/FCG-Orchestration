apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: payment-api
  namespace: fcg-observability
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: payment-api
  namespaceSelector:
    matchNames:
      - fcg-services
  endpoints:
    - port: http
      path: /metrics
      interval: 15s